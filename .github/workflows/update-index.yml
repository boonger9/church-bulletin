name: 주보 목록 자동 갱신

on:
  push:
    branches: [ main ]
    paths:
      - '20[0-9][0-9]-[0-9][0-9]-[0-9][0-9].html'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: index.html 자동 생성
        run: python3 generate_index.py

      - name: 변경사항 저장 및 반영
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add index.html
          git diff --staged --quiet || (git commit -m "🤖 주보 목록 자동 갱신" && git push)
